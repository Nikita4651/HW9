
services:
  mysqldb:
    image: mysql:latest
    container_name: app
    ports:
      - '3306:3306'
    volumes:
          - ./init-scripts:/docker-entrypoint-initdb.d
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_DATABASE=db
      - MYSQL_USER=app
      - MYSQL_PASSWORD=pass


